<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFinance | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Dev<span>Finance</span></h1>
        </header>

        <section class="balance">
            <div class="card">
                <h3>Entradas</h3>
                <p id="incomeDisplay">R$ 0,00</p>
            </div>
            <div class="card">
                <h3>Saídas</h3>
                <p id="expenseDisplay">R$ 0,00</p>
            </div>
            <div class="card total">
                <h3>Total</h3>
                <p id="totalDisplay">R$ 0,00</p>
            </div>
        </section>

        <section class="transaction-form">
            <h2>Nova Transação</h2>
            <form id="form">
                <input type="text" id="description" placeholder="Ex: Aluguel" required>
                <input type="number" step="0.01" id="amount" placeholder="Ex: -1200.00" required>
                <small>Use sinal negativo (-) para despesas.</small>
                <button type="submit">Salvar</button>
            </form>
        </section>

        <section class="history">
            <h2>Histórico</h2>
            <ul id="transactions"></ul>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
